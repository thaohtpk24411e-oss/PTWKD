<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="ReViet — product detail. Handcrafted Vietnamese goods with a traceable, sustainable story." />
  <title>ReViet — Product Detail</title>

  <link rel="icon" href="../assets/icons/favicon.ico" sizes="any" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Jost:wght@300;400;500&family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="../assets/css/base.css" />
  <link rel="stylesheet" href="../assets/css/product-detail.css" />
</head>
<body>
  <!-- Shared component -->
  <div data-include="../components/header/header"></div>

  <main class="pd">
    <div class="container pd-top">
      <div class="pd-gallery">
        <div class="pd-thumbs" id="pd-thumbs"></div>
        <div class="pd-stage" id="pd-stage"></div>
      </div>
      <div class="pd-info" id="pd-info">
        <p class="eyebrow">Loading…</p>
      </div>
    </div>

    <!-- Seller -->
    <section class="pd-seller">
      <div class="container pd-seller-inner" id="pd-seller"></div>
    </section>

    <!-- Reviews -->
    <section class="pd-reviews">
      <div class="container">
        <div class="pd-section-head">
          <h2>Reflections</h2>
          <a class="link-underline" id="pd-reviews-all" href="#">View All Reviews</a>
        </div>
        <div class="pd-reviews-grid" id="pd-reviews"></div>
      </div>
    </section>

    <!-- Related -->
    <section class="pd-related">
      <div class="container">
        <h2 class="pd-related-title">Complements the Collection</h2>
        <div class="pd-related-grid" id="pd-related"></div>
      </div>
    </section>
  </main>

  <!-- Shared component -->
  <div data-include="../components/footer/footer"></div>

  <script src="../assets/js/include.js"></script>
  <script src="../assets/js/product-detail.js"></script>
</body>
</html>
