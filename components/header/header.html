<!-- Shared header component (markup only). Styles: header.css · Behavior: header.js -->
<header class="site-header">
  <div class="container header-inner">
    <a class="logo" href="/html/home_page.html">ReViet</a>

    <nav class="main-nav" id="main-nav">
      <a href="/html/product_page.html">Shop</a>
      <a href="#">Artisans</a>
      <a href="#">About</a>
      <a href="#">Become a Seller</a>
    </nav>

    <div class="header-actions">
      <!-- Search -->
      <button class="icon-btn" id="search-toggle" aria-label="Search">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.6"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.5" y2="16.5"/></svg>
      </button>

      <!-- Notification bell -->
      <div class="hdr-drop-wrap" id="notif-wrap">
        <button class="icon-btn" id="notif-toggle" aria-label="Notifications">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
          <span class="hdr-badge" id="notif-badge" hidden></span>
        </button>
        <div class="hdr-dropdown notif-dropdown" id="notif-dropdown" hidden>
          <div class="hdr-drop-head">
            <span>Notifications</span>
            <button class="hdr-mark-all" id="notif-mark-all">Mark all read</button>
          </div>
          <div class="notif-list" id="notif-list">
            <p style="padding:16px 18px;color:var(--muted);font-size:.82rem">Loading…</p>
          </div>
          <div class="hdr-drop-foot">
            <button class="hdr-see-more" id="notif-see-more">See more</button>
          </div>
        </div>
      </div>

      <!-- Cart with preview dropdown -->
      <div class="hdr-drop-wrap" id="cart-wrap">
        <button class="icon-btn" id="cart-toggle" aria-label="Cart">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M6 7h12l-1 13H7L6 7z"/><path d="M9 7a3 3 0 0 1 6 0"/></svg>
          <span class="hdr-badge" id="cart-badge" hidden></span>
        </button>
        <div class="hdr-dropdown cart-dropdown" id="cart-dropdown" hidden>
          <div class="hdr-drop-head"><span>Your Cart</span></div>
          <div class="cart-preview-list" id="cart-preview-list">
            <div class="cart-preview-empty">Loading…</div>
          </div>
          <div class="hdr-drop-foot">
            <a class="hdr-view-cart-btn" href="/html/cart.html">View All Cart →</a>
          </div>
        </div>
      </div>

      <!-- Account -->
      <div class="account-wrap" id="account-wrap">
        <a class="icon-btn" href="/html/login.html" id="account-link" aria-label="Account">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.6"><circle cx="12" cy="8" r="3.5"/><path d="M5 20a7 7 0 0 1 14 0"/></svg>
        </a>
      </div>

      <!-- Hamburger -->
      <button class="icon-btn nav-toggle" id="nav-toggle" aria-label="Menu" aria-expanded="false">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.6"><line x1="4" y1="7" x2="20" y2="7"/><line x1="4" y1="12" x2="20" y2="12"/><line x1="4" y1="17" x2="20" y2="17"/></svg>
      </button>
    </div>
  </div>

  <!-- Search bar with results dropdown -->
  <div class="header-search" id="header-search" hidden>
    <div class="container">
      <div class="search-input-wrap">
        <input type="search" id="search-input" placeholder="Search for artisan goods…" aria-label="Search" autocomplete="off" />
        <div class="search-results" id="search-results" hidden></div>
      </div>
    </div>
  </div>
</header>
